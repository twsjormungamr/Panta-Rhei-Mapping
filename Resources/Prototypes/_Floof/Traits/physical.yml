      - Biological
      - BiologicalMetaphysical
    - type: ShowHealthIcons
      damageContainers:
      - Biological
      - BiologicalMetaphysical

- type: trait
  id: CyberEyesOmni
  category: Medical
  name: trait-name-CyberEyesOmni
  description: trait-description-CyberEyesOmni
  cost: 6
  conflicts:
  - CyberEyesMedical
  - CyberEyesSecurity
  conditions:
  - !type:InDepartmentCondition
    department: Command
  effects:
  - !type:AddCompsEffect
    components:
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons
    #- type: SolutionScanner
    - type: ShowHealthIcons
      damageContainers:
      - Biological
      - BiologicalMetaphysical
    - type: ShowHealthBars
      damageContainers:
      - Biological
      - BiologicalMetaphysical
