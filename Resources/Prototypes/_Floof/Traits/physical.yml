# ================= Stamina traits ================== #
- type: trait
  id: Vigor
  name: trait-vigor-name
  description: trait-vigor-desc
  category: Medical
  cost: 4 # I don't think it's extremely useful in combat, but it can help you survive one extra stunbaton hit.
  conflicts:
  - Vigor
  - Lethargy
  - Weakness
  conditions:
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  - !type:OneOfSpeciesCondition # Presumably this is related to IPCs and Onis already being hella strong? On EE floof stamina damage was based on a mass contest, so it makes sense.
    invert: true
    species:
    - Oni
    - IPC
  effects:
  - !type:ModifyStaminaThresholdEffect
    multiplier: 1.2

- type: trait
  id: Lethargy
  name: trait-lethargy-name
  description: trait-lethargy-desc
  category: Medical
  cost: -2
  conflicts:
  - Vigor
  - Lethargy
  - Weakness
  conditions:
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects:
  - !type:ModifyStaminaThresholdEffect
    multiplier: 0.8

- type: trait
  id: Weakness
  name: trait-weakness-name
  description: trait-weakness-desc
  category: Medical
  cost: -5 # Getting stunned from 1-2 stunbaton or disabler hits is worth a lot.
  conflicts:
  - Vigor
  - Lethargy
  - Weakness
  conditions:
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  effects:
  - !type:ModifyStaminaThresholdEffect
    multiplier: 0.5
