    department: Security
  effects:
  - !type:AddCompsEffect
    components:
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: ShowCriminalRecordIcons

- type: trait
  id: CyberEyesMedical
  category: Medical
  name: trait-name-CyberEyesMedical
  description: trait-description-CyberEyesMedical
  cost: 4
  conflicts:
    - CyberEyesOmni
