  components:
  - type: Sprite
    sprite: _Floof/Objects/Fun/floof_plush.rsi
    state: grumpycmo
  - type: UseDelay
    delay: 2.0
  - type: EmitSoundOnActivate
    sound: &cat_meow2
      path: /Audio/Nyanotrasen/Voice/Felinid/cat_meow2.ogg
      params:
        volume: 2
  - type: EmitSoundOnUse
    sound: *cat_meow2
  - type: EmitSoundOnLand
    sound: &cat_hiss2
      path: /Audio/Nyanotrasen/Voice/Felinid/cat_hiss2.ogg
      params:
        variation: 0.05
  - type: EmitSoundOnCollide
    sound: *cat_hiss2
  - type: MeleeWeapon
    soundHit: *cat_hiss2

